<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2535"/>
    </linearGradient>

    <!-- Body gradient -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2d3d"/>
      <stop offset="100%" style="stop-color:#162030"/>
    </linearGradient>

    <!-- Left eye glow (Telegram blue) -->
    <radialGradient id="eyeLeft" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="40%" style="stop-color:#67d7ff"/>
      <stop offset="100%" style="stop-color:#2AABEE"/>
    </radialGradient>

    <!-- Right eye glow (Claude orange) -->
    <radialGradient id="eyeRight" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="40%" style="stop-color:#ffd580"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </radialGradient>

    <!-- Blue glow filter -->
    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Orange glow filter -->
    <filter id="glowOrange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <!-- Inner glow for body -->
    <filter id="bodyGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for rounded square background -->
    <clipPath id="bgClip">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Subtle radial light from center -->
  <radialGradient id="centerLight" cx="50%" cy="52%" r="45%">
    <stop offset="0%" style="stop-color:#2AABEE; stop-opacity:0.08"/>
    <stop offset="50%" style="stop-color:#D97706; stop-opacity:0.04"/>
    <stop offset="100%" style="stop-color:#000; stop-opacity:0"/>
  </radialGradient>
  <rect width="512" height="512" rx="96" fill="url(#centerLight)"/>

  <!-- ===== ANTENNA ===== -->
  <!-- Antenna pole -->
  <rect x="248" y="82" width="16" height="60" rx="8" fill="#2a3a4a"/>
  <!-- Antenna ball — split blue/orange -->
  <circle cx="256" cy="72" r="22" fill="#1a2535" stroke="#2a3a4a" stroke-width="2"/>
  <path d="M256,50 A22,22 0 0,1 278,72 L256,72 Z" fill="#2AABEE" opacity="0.9"/>
  <path d="M256,72 A22,22 0 0,1 234,72 L256,72 Z" fill="#D97706" opacity="0.9"/>
  <circle cx="256" cy="72" r="8" fill="#e6edf3"/>
  <circle cx="256" cy="72" r="4" fill="#0f1923"/>

  <!-- ===== BODY ===== -->
  <!-- Main body -->
  <rect x="110" y="175" width="292" height="220" rx="36" fill="url(#bodyGrad)" filter="url(#softShadow)"
        stroke="#2a3a4a" stroke-width="2"/>

  <!-- Head top rounded bar -->
  <rect x="140" y="142" width="232" height="110" rx="30" fill="url(#bodyGrad)"
        stroke="#2a3a4a" stroke-width="2"/>

  <!-- Visor / face plate -->
  <rect x="158" y="158" width="196" height="78" rx="20" fill="#0a1520" stroke="#1e2d40" stroke-width="1.5"/>

  <!-- ===== EYES ===== -->
  <!-- Left eye socket -->
  <circle cx="211" cy="197" r="28" fill="#060e18"/>
  <!-- Left eye iris (Telegram blue) -->
  <circle cx="211" cy="197" r="20" fill="url(#eyeLeft)" filter="url(#glowBlue)"/>
  <!-- Left eye shine -->
  <circle cx="204" cy="190" r="5" fill="white" opacity="0.7"/>
  <circle cx="218" cy="202" r="2.5" fill="white" opacity="0.3"/>

  <!-- Right eye socket -->
  <circle cx="301" cy="197" r="28" fill="#060e18"/>
  <!-- Right eye iris (Claude orange) -->
  <circle cx="301" cy="197" r="20" fill="url(#eyeRight)" filter="url(#glowOrange)"/>
  <!-- Right eye shine -->
  <circle cx="294" cy="190" r="5" fill="white" opacity="0.7"/>
  <circle cx="308" cy="202" r="2.5" fill="white" opacity="0.3"/>

  <!-- Eye pupils -->
  <circle cx="211" cy="197" r="8" fill="#000d1a"/>
  <circle cx="301" cy="197" r="8" fill="#000d1a"/>
  <!-- Pupil reflection -->
  <circle cx="208" cy="194" r="3" fill="white" opacity="0.8"/>
  <circle cx="298" cy="194" r="3" fill="white" opacity="0.8"/>

  <!-- ===== NOSE ===== -->
  <rect x="249" y="212" width="14" height="10" rx="5" fill="#1e2d3d"/>

  <!-- ===== MOUTH ===== -->
  <rect x="178" y="268" width="156" height="32" rx="16" fill="#0a1520" stroke="#1e2d40" stroke-width="1"/>
  <!-- Teeth / speaker grille -->
  <rect x="192" y="276" width="14" height="16" rx="4" fill="#2AABEE" opacity="0.7"/>
  <rect x="212" y="276" width="14" height="16" rx="4" fill="#2a3a4a" opacity="0.6"/>
  <rect x="232" y="276" width="14" height="16" rx="4" fill="#2a3a4a" opacity="0.6"/>
  <rect x="252" y="276" width="14" height="16" rx="4" fill="#2a3a4a" opacity="0.6"/>
  <rect x="272" y="276" width="14" height="16" rx="4" fill="#2a3a4a" opacity="0.6"/>
  <rect x="292" y="276" width="14" height="16" rx="4" fill="#D97706" opacity="0.7"/>

  <!-- ===== EARS / SIDE BOLTS ===== -->
  <!-- Left ear -->
  <rect x="88" y="190" width="26" height="46" rx="13" fill="#1e2d3d" stroke="#2a3a4a" stroke-width="1.5"/>
  <circle cx="101" cy="213" r="6" fill="#2AABEE" opacity="0.6" filter="url(#glowBlue)"/>
  <!-- Right ear -->
  <rect x="398" y="190" width="26" height="46" rx="13" fill="#1e2d3d" stroke="#2a3a4a" stroke-width="1.5"/>
  <circle cx="411" cy="213" r="6" fill="#D97706" opacity="0.6" filter="url(#glowOrange)"/>

  <!-- ===== CHEST PANEL ===== -->
  <rect x="148" y="310" width="216" height="66" rx="14" fill="#0a1520" stroke="#1e2d40" stroke-width="1"/>

  <!-- Left side: Telegram icon mini -->
  <circle cx="195" cy="343" r="22" fill="#2AABEE" opacity="0.15"/>
  <circle cx="195" cy="343" r="14" fill="#2AABEE" opacity="0.25"/>
  <!-- Mini plane -->
  <g transform="translate(195,343) scale(0.7)">
    <polygon points="-12,-8 16,0 -12,8 -6,2 -6,-2" fill="#2AABEE" opacity="0.95"/>
    <polygon points="-6,2 -2,7 2,3 -6,2" fill="#2AABEE" opacity="0.6"/>
  </g>

  <!-- Center divider -->
  <line x1="256" y1="318" x2="256" y2="368" stroke="#1e2d40" stroke-width="1.5"/>

  <!-- Right side: Claude icon mini -->
  <circle cx="317" cy="343" r="22" fill="#D97706" opacity="0.15"/>
  <circle cx="317" cy="343" r="14" fill="#D97706" opacity="0.25"/>
  <!-- Mini Claude C -->
  <g transform="translate(317,343)">
    <ellipse cx="-2" cy="0" rx="10" ry="12" fill="none" stroke="#D97706" stroke-width="2.5" opacity="0.9"/>
    <ellipse cx="2" cy="0" rx="10" ry="12" fill="none" stroke="#D97706" stroke-width="2.5" opacity="0.5"/>
  </g>

  <!-- Status LED strip -->
  <rect x="190" y="384" width="132" height="6" rx="3" fill="#0a1520"/>
  <rect x="190" y="384" width="44" height="6" rx="3" fill="#2AABEE" opacity="0.8"/>
  <rect x="234" y="384" width="44" height="6" rx="3" fill="#3fb950" opacity="0.7"/>
  <rect x="278" y="384" width="44" height="6" rx="3" fill="#D97706" opacity="0.8"/>

  <!-- ===== LEGS ===== -->
  <rect x="168" y="398" width="72" height="52" rx="16" fill="#1e2d3d" stroke="#2a3a4a" stroke-width="1.5"/>
  <rect x="272" y="398" width="72" height="52" rx="16" fill="#1e2d3d" stroke="#2a3a4a" stroke-width="1.5"/>
  <!-- Foot highlights -->
  <rect x="178" y="432" width="52" height="10" rx="5" fill="#2a3a4a"/>
  <rect x="282" y="432" width="52" height="10" rx="5" fill="#2a3a4a"/>

  <!-- ===== SCREW DETAILS on body corners ===== -->
  <circle cx="132" cy="198" r="5" fill="#0a1520" stroke="#2a3a4a" stroke-width="1"/>
  <line x1="129" y1="198" x2="135" y2="198" stroke="#2a3a4a" stroke-width="1"/>
  <circle cx="380" cy="198" r="5" fill="#0a1520" stroke="#2a3a4a" stroke-width="1"/>
  <line x1="377" y1="198" x2="383" y2="198" stroke="#2a3a4a" stroke-width="1"/>

  <!-- Top subtle highlight on body -->
  <rect x="140" y="142" width="232" height="18" rx="16" fill="white" opacity="0.03"/>
</svg>
