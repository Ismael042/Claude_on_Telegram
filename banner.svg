<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <!-- Dark gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <!-- Telegram blue gradient -->
    <linearGradient id="tgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2AABEE"/>
      <stop offset="100%" style="stop-color:#229ED9"/>
    </linearGradient>
    <!-- Claude orange gradient -->
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706"/>
      <stop offset="100%" style="stop-color:#B45309"/>
    </linearGradient>
    <!-- Terminal gradient -->
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2530"/>
      <stop offset="100%" style="stop-color:#141920"/>
    </linearGradient>
    <!-- Glow filter for arrows -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Card shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <!-- Subtle glow for cards -->
    <filter id="cardGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.15" opacity="0.3"/>
  </pattern>
  <rect width="900" height="500" fill="url(#grid)"/>

  <!-- Title area -->
  <text x="450" y="52" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="500"
        fill="#6e7681" text-anchor="middle" letter-spacing="3">TELEGRAM · CLAUDE · BRIDGE</text>
  <text x="450" y="88" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="700"
        fill="#e6edf3" text-anchor="middle" letter-spacing="-0.5">Ponte Telegram Claude</text>

  <!-- Decorative line under title -->
  <line x1="330" y1="100" x2="570" y2="100" stroke="#30363d" stroke-width="1"/>

  <!-- ======= TELEGRAM CARD (left) ======= -->
  <rect x="60" y="140" width="210" height="240" rx="16" fill="url(#termGrad)" filter="url(#shadow)"
        stroke="#2AABEE" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Telegram icon circle -->
  <circle cx="165" cy="205" r="42" fill="url(#tgGrad)" filter="url(#shadow)"/>
  <!-- Telegram paper plane icon -->
  <g transform="translate(165,205)">
    <polygon points="-18,-12 22,0 -18,12 -10,2 -10,-2" fill="white" opacity="0.95"/>
    <polygon points="-10,2 -4,10 2,4 -10,2" fill="white" opacity="0.7"/>
  </g>

  <text x="165" y="268" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700"
        fill="#e6edf3" text-anchor="middle">Telegram</text>
  <text x="165" y="288" font-family="'Segoe UI', system-ui, sans-serif" font-size="11"
        fill="#8b949e" text-anchor="middle">Bot API</text>

  <!-- Chat bubbles decorative -->
  <rect x="88" y="308" width="120" height="22" rx="11" fill="#2AABEE" opacity="0.2"/>
  <text x="148" y="323" font-family="'Segoe UI', monospace, sans-serif" font-size="9"
        fill="#58a6ff" text-anchor="middle">/start  /reset  /dir</text>
  <rect x="98" y="336" width="100" height="22" rx="11" fill="#2AABEE" opacity="0.12"/>
  <text x="148" y="351" font-family="'Segoe UI', monospace, sans-serif" font-size="9"
        fill="#8b949e" text-anchor="middle">mensagem livre</text>

  <!-- Label -->
  <text x="165" y="395" font-family="'Segoe UI', system-ui, sans-serif" font-size="10"
        fill="#3d4854" text-anchor="middle">INTERFACE DO USUÁRIO</text>

  <!-- ======= PYTHON BOT CARD (center) ======= -->
  <rect x="335" y="130" width="230" height="260" rx="16" fill="url(#termGrad)" filter="url(#shadow)"
        stroke="#8250df" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Bot icon -->
  <circle cx="450" cy="198" r="38" fill="#21262d" stroke="#8250df" stroke-width="1.5"/>
  <!-- Robot face -->
  <rect x="430" y="183" width="40" height="28" rx="6" fill="#8250df" opacity="0.85"/>
  <circle cx="441" cy="196" r="4" fill="white"/>
  <circle cx="459" cy="196" r="4" fill="white"/>
  <rect x="441" y="207" width="18" height="3" rx="1.5" fill="white" opacity="0.7"/>
  <!-- Antenna -->
  <line x1="450" y1="183" x2="450" y2="172" stroke="#8250df" stroke-width="2"/>
  <circle cx="450" cy="170" r="3" fill="#8250df"/>

  <text x="450" y="258" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="700"
        fill="#e6edf3" text-anchor="middle">bot.py</text>
  <text x="450" y="276" font-family="'Segoe UI', system-ui, sans-serif" font-size="10"
        fill="#8b949e" text-anchor="middle">Python · python-telegram-bot</text>

  <!-- Code snippet decorative -->
  <rect x="355" y="292" width="190" height="72" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="370" y="310" font-family="'Courier New', monospace" font-size="8.5" fill="#8250df">PTYSession</text>
  <text x="370" y="324" font-family="'Courier New', monospace" font-size="8.5" fill="#6e7681">▸ spawn claude-code</text>
  <text x="370" y="337" font-family="'Courier New', monospace" font-size="8.5" fill="#6e7681">▸ OutputBuffer stream</text>
  <text x="370" y="350" font-family="'Courier New', monospace" font-size="8.5" fill="#6e7681">▸ formatter strip_ansi</text>

  <text x="450" y="412" font-family="'Segoe UI', system-ui, sans-serif" font-size="10"
        fill="#3d4854" text-anchor="middle">NÚCLEO DA APLICAÇÃO</text>

  <!-- ======= CLAUDE CODE CARD (right) ======= -->
  <rect x="630" y="140" width="210" height="240" rx="16" fill="url(#termGrad)" filter="url(#shadow)"
        stroke="#D97706" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Claude icon -->
  <circle cx="735" cy="205" r="42" fill="url(#claudeGrad)" filter="url(#shadow)"/>
  <!-- Claude stylized C / brain icon -->
  <g transform="translate(735,205)">
    <!-- Stylized Claude logo - two overlapping shapes -->
    <ellipse cx="-4" cy="0" rx="16" ry="20" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.9"/>
    <ellipse cx="4" cy="0" rx="16" ry="20" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.6"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="white" opacity="0.9"/>
  </g>

  <text x="735" y="268" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700"
        fill="#e6edf3" text-anchor="middle">Claude Code</text>
  <text x="735" y="288" font-family="'Segoe UI', system-ui, sans-serif" font-size="11"
        fill="#8b949e" text-anchor="middle">CLI · PTY</text>

  <!-- Terminal lines decorative -->
  <rect x="653" y="308" width="164" height="60" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="663" y="324" font-family="'Courier New', monospace" font-size="8" fill="#D97706">$ claude-code</text>
  <text x="663" y="338" font-family="'Courier New', monospace" font-size="8" fill="#3fb950">✓ session started</text>
  <text x="663" y="352" font-family="'Courier New', monospace" font-size="8" fill="#58a6ff">▸ streaming output...</text>

  <text x="735" y="395" font-family="'Segoe UI', system-ui, sans-serif" font-size="10"
        fill="#3d4854" text-anchor="middle">IA · MODELO DE LINGUAGEM</text>

  <!-- ======= ARROWS ======= -->
  <!-- Left arrow: Telegram → Bot (bidirectional) -->
  <!-- Forward arrow -->
  <g filter="url(#glow)">
    <line x1="275" y1="248" x2="328" y2="248" stroke="#2AABEE" stroke-width="2" stroke-opacity="0.8"/>
    <polygon points="330,248 320,243 320,253" fill="#2AABEE" opacity="0.8"/>
    <!-- Return arrow -->
    <line x1="328" y1="262" x2="275" y2="262" stroke="#2AABEE" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="5,3"/>
    <polygon points="273,262 283,257 283,267" fill="#2AABEE" opacity="0.4"/>
  </g>
  <!-- Label -->
  <text x="301" y="243" font-family="'Segoe UI', system-ui, sans-serif" font-size="8"
        fill="#2AABEE" text-anchor="middle" opacity="0.9">update</text>
  <text x="301" y="276" font-family="'Segoe UI', system-ui, sans-serif" font-size="8"
        fill="#2AABEE" text-anchor="middle" opacity="0.5">reply</text>

  <!-- Right arrow: Bot → Claude (bidirectional) -->
  <g filter="url(#glow)">
    <line x1="572" y1="248" x2="625" y2="248" stroke="#D97706" stroke-width="2" stroke-opacity="0.8"/>
    <polygon points="627,248 617,243 617,253" fill="#D97706" opacity="0.8"/>
    <!-- Return arrow -->
    <line x1="625" y1="262" x2="572" y2="262" stroke="#D97706" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="5,3"/>
    <polygon points="570,262 580,257 580,267" fill="#D97706" opacity="0.4"/>
  </g>
  <!-- Label -->
  <text x="598" y="243" font-family="'Segoe UI', system-ui, sans-serif" font-size="8"
        fill="#D97706" text-anchor="middle" opacity="0.9">stdin</text>
  <text x="598" y="276" font-family="'Segoe UI', system-ui, sans-serif" font-size="8"
        fill="#D97706" text-anchor="middle" opacity="0.5">stdout</text>

  <!-- ======= FOOTER ======= -->
  <text x="450" y="460" font-family="'Segoe UI', system-ui, sans-serif" font-size="11"
        fill="#30363d" text-anchor="middle">Python · PTY · Asyncio · python-telegram-bot · Claude Code CLI</text>

  <!-- Decorative dots bottom -->
  <circle cx="430" cy="478" r="2.5" fill="#2AABEE" opacity="0.4"/>
  <circle cx="450" cy="478" r="2.5" fill="#8250df" opacity="0.4"/>
  <circle cx="470" cy="478" r="2.5" fill="#D97706" opacity="0.4"/>
</svg>
